name: QNA Generation Pipeline

on:
  push:
    paths:
      - 'Subjects/**/*.pdf'
      - 'Subjects/**/*.pptx'
      - 'Subjects/**/*.ppt'
  workflow_dispatch:  # Manual trigger
  # schedule:
  #   - cron: '0 0 * * *'  # Uncomment to run daily at midnight UTC

permissions:
  contents: write

jobs:
  generate-qna:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies (weasyprint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libffi-dev libjpeg-dev libopenjp2-7-dev libgdk-pixbuf2.0-0

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run QNA Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_PROVIDER: gemini
        run: python scripts/run_pipeline.py

      - name: Commit and Push generated QNAs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bash scripts/git_sync.sh
